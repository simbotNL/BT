<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#F7F5F0">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="./styles.css">
<title>Budget</title>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div>
      <div class="hdr-month" id="hdr-month"></div>
      <div class="hdr-title" id="hdr-title">Budget</div>
    </div>
    <button class="month-btn" id="period-btn" aria-label="Select period">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" width="14" height="14">
        <rect x="2" y="3" width="16" height="15" rx="3"/>
        <path d="M6 1v4M14 1v4M2 8h16"/>
      </svg>
      <span id="period-btn-label">Period</span>
    </button>
  </div>

  <div class="scroll" id="scroll">
    <div id="content" style="padding-bottom:16px"></div>
  </div>

  <div id="tabs">
    <button class="tab on" id="t-dash" data-page="dash">
      <div class="tab-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Home
    </button>
    <button class="tab" id="t-budget" data-page="budget">
      <div class="tab-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 7H6a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-3M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2m0 0h3"/><path d="M9 12h6M9 16h4"/></svg>
      Budget
    </button>
    <button class="tab" id="t-spend" data-page="spend">
      <div class="tab-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
      Spending
    </button>
    <button class="tab" id="t-alerts" data-page="alerts">
      <div class="tab-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      Alerts
    </button>
    <button class="tab" id="t-worth" data-page="worth">
      <div class="tab-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
      Net Worth
    </button>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
